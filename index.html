            const knownNewMoon = new Date(2000, 0, 6, 18, 14);
            const lunarCycle = 29.53058867;
            const diff = (date - knownNewMoon) / (1000 * 60 * 60 * 24);
            const phase = ((diff % lunarCycle) + lunarCycle) % lunarCycle;
            if (phase < 1.84566) return '●';
            if (phase < 5.53699) return '☽';
            if (phase < 9.22831) return '◐';
            if (phase < 12.91963) return '◑';
            if (phase < 16.61096) return '○';
            if (phase < 20.30228) return '◐';
            if (phase < 23.99361) return '◑';
            if (phase < 27.68493) return '☾';
            return '●';
        }

        const BATCH_SIZE = 8;
        let renderedCount = 0;
        let isRendering = false;

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function wrapWords(content, postIndex) {
            const escaped = escapeHtml(content);
            return escaped.split('\n').map(line =>
                line.split(' ').map((word, i) => {
                    const delay = ((i * 0.1) + (postIndex * 0.3)) % 2;
                    return `<span class="word" style="animation-delay:${delay.toFixed(2)}s">${word}</span>`;
                }).join(' ')
            ).join('\n');
        }

        function renderBatch() {
            if (isRendering || renderedCount >= posts.length) return;
            isRendering = true;

            const container = document.getElementById('entries');
            const fragment = document.createDocumentFragment();
            const end = Math.min(renderedCount + BATCH_SIZE, posts.length);

            for (let i = renderedCount; i < end; i++) {
                const post = posts[i];
                const div = document.createElement('div');
                div.className = 'entry';

                const dateString = new Date(post.timestamp).toLocaleDateString('en-US', {
                    weekday: 'long', year: 'numeric', month: 'long',
                    day: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                let photoHtml = '';
                if (post.photo) {
                    const img = `<img src="${post.photo}" alt="Blog photo" class="post-photo" loading="lazy" decoding="async">`;
                    photoHtml = `<div class="post-photo-wrapper">${post.link ? `<a href="${post.link}" target="_blank">${img}</a>` : img}</div>`;
                }

                div.innerHTML = `
                    <div class="entry-date">${dateString}</div>
                    <div class="entry-content">${post.content ? wrapWords(post.content, i) : ''}</div>
                    ${photoHtml}
                `;
                fragment.appendChild(div);
            }

            container.appendChild(fragment);
            renderedCount = end;
            isRendering = false;
        }

        const sentinel = document.getElementById('load-sentinel');
        const loadObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) renderBatch();
        }, { rootMargin: '200px' });

        loadObserver.observe(sentinel);
        renderBatch();

        function getLastOnline() {
            const mostRecent = posts.reduce((a, b) =>
                new Date(a.timestamp) > new Date(b.timestamp) ? a : b);

            const diffDays = Math.floor((new Date() - postDate) / (1000 * 60 * 60 * 24));
            const timeAgo = diffDays === 0 ? 'today' : diffDays === 1 ? '1 day ago' : `${diffDays} days ago`;

        const emailLink = document.getElementById('emailLink');
        let emailClicked = false;
        emailLink.addEventListener('click', (e) => {
            e.preventDefault();
            if (emailClicked) return;
            emailClicked = true;
            emailLink.classList.add('hidden');
            const emailText = document.createElement('div');
            emailText.className = 'email-reveal';
            emailText.textContent = 'screenshotscents [at] gmail';
            document.querySelector('header').appendChild(emailText);
            setTimeout(() => {
                emailText.classList.add('misting');
                setTimeout(() => { emailText.remove(); emailClicked = false; emailLink.classList.remove('hidden'); }, 4000);
            }, 1500);
        });

        const input = document.getElementById('testerInput');
        const cardStack = document.getElementById('cardStack');
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxQ4l46fvEUFX_CcfhXJ6QRQomfJ1DcomWv73K9DwNUjyvpHVQqdsNCCuFQYLf0PKCRtg/exec';
        let submissions = [];
        let isLoading = false;

        async function loadSubmissions() {
            try {
                const data = await (await fetch(SCRIPT_URL)).json();
                submissions = data.submissions || [];
                renderCards();
            } catch (e) { console.error(e); }
        }

        async function saveSubmission(text) {
            if (isLoading) return;
            isLoading = true;
            try {
                const data = await (await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ submission: text }) })).json();
                if (data.success) { submissions = data.submissions || []; renderCards(); }
            } catch (e) { console.error(e); }
            finally { isLoading = false; }
        }

        function stripPunctuation(t) { return t.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()'"?]/g, ''); }

        function createCard(text) {
            const card = document.createElement('div');
            card.className = 'strip-card';
            card.innerHTML = `<svg class="strip-svg" viewBox="0 0 240 70" preserveAspectRatio="none"><path d="M 0,7 L 200,7 L 240,35 L 200,63 L 0,63 Z" fill="white" stroke="black" stroke-width="0.3"/></svg><div class="submission-text">${text}</div>`;
            return card;
        }

        function renderCards() {
            cardStack.innerHTML = '';
            submissions.slice(0, 10).forEach(t => cardStack.appendChild(createCard(t)));
        }

        cardStack.addEventListener('click', () => {
            if (submissions.length > 1) {
                const top = cardStack.querySelector('.strip-card:first-child');
                if (top && !top.classList.contains('moving-back')) {
                    top.classList.add('moving-back');
                    setTimeout(() => { submissions.push(submissions.shift()); renderCards(); }, 800);
                }
            }
        });

        if (input) {
            input.addEventListener('keypress', async (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const text = stripPunctuation(input.value.trim());
                    if (text && !isLoading) {
                        input.value = '';
                        input.placeholder = 'saving...';
                        await saveSubmission(text);
                        input.placeholder = 'capture a moment';
                    }
                }
            });
        }

        loadSubmissions();

    </script>
</body>
</html>
