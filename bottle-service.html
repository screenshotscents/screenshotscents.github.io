<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" type="image/png" href="favicon-32x32.png">
    <link rel="icon" type="image/png" href="favicon-32x32.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottle Service - Screenshot Scents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        *:not(.back-link) {
            cursor: none;
        }

        #custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            background-image: url('dog_nose_cropped.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.5s ease;
            opacity: 0.3;
            display: none;
            filter: blur(1px);
        }

        #custom-cursor.hidden {
            opacity: 0;
        }

        @media (hover: hover) and (pointer: fine) {
            #custom-cursor {
                display: block;
            }
        }

        body {
            background: white;
            color: black;
            font-family: 'Times New Roman', Times, serif;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.0;
        }

        header {
            text-align: left;
            margin-bottom: 50px;
            padding-bottom: 30px;
        }

        h1 {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 20px;
            display: inline-block;
        }

        .back-link {
            font-size: 1.1em;
            color: #000;
            text-decoration: none;
            cursor: pointer;
            pointer-events: auto;
            display: inline-block;
            margin-top: 10px;
        }

        .back-link:hover {
            color: #000;
        }

        .perfume-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin-top: 40px;
            max-width: 800px;
        }

        .perfume-item {
            display: flex;
            flex-direction: column;
            gap: 15px;
            cursor: pointer;
        }

        .perfume-image {
            width: 100%;
            height: 400px;
            object-fit: contain;
            display: block;
            transition: opacity 0.3s ease;
        }

        .perfume-item:hover .perfume-image {
            opacity: 0.7;
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: transparent;
            border: none;
            padding: 40px;
            max-width: 500px;
            position: relative;
            opacity: 0;
            animation: fadeIn 0.8s ease-in forwards;
        }

        .modal-content.misting {
            animation: mistOut 4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes mistOut {
            0% {
                opacity: 1;
                filter: blur(0px);
            }
            50% {
                opacity: 0.5;
                filter: blur(1px);
            }
            100% {
                opacity: 0;
                filter: blur(3px);
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5em;
            cursor: pointer;
            pointer-events: auto;
            border: none;
            background: none;
            font-family: 'Times New Roman', Times, serif;
        }

        .modal-name {
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .modal-field {
            font-size: 1.1em;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .perfume-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 20px;
                max-width: 90%;
            }
        }

        .moon-symbol-fixed {
            position: fixed;
            top: 40px;
            right: 20px;
            font-size: 1.5em;
            color: black;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .moon-symbol-fixed {
                top: 40px;
            }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <div class="moon-symbol-fixed" id="moonSymbol"></div>

    <header>
        <h1>bottle service</h1>
        <br>
        <a href="index.html" class="back-link">← back</a>
    </header>

    <div class="perfume-grid" id="perfumeGrid"></div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">×</button>
            <div class="modal-name" id="modalName"></div>
            <div class="modal-field" id="modalSmells"></div>
            <div class="modal-field" id="modalOccasion"></div>
        </div>
    </div>

    <script>
        // Moon Phase
        function getMoonPhase(date) {
            const knownNewMoon = new Date(2000, 0, 6, 18, 14);
            const lunarCycle = 29.53058867;
            
            const diff = (date - knownNewMoon) / (1000 * 60 * 60 * 24);
            const phase = ((diff % lunarCycle) + lunarCycle) % lunarCycle;
            
            if (phase < 1.84566) return '●';
            if (phase < 5.53699) return '☽';
            if (phase < 9.22831) return '◐';
            if (phase < 12.91963) return '◑';
            if (phase < 16.61096) return '○';
            if (phase < 20.30228) return '◐';
            if (phase < 23.99361) return '◑';
            if (phase < 27.68493) return '☾';
            return '●';
        }
        
        function updateMoonSymbol() {
            const now = new Date();
            const moonSymbol = getMoonPhase(now);
            document.getElementById('moonSymbol').textContent = moonSymbol;
        }
        
        updateMoonSymbol();
        setInterval(updateMoonSymbol, 60000);

        // Perfume data
        const perfumes = [
            {
                name: 'virgin violet',
                image: 'gucci_halftone.gif',
                smells: 'grandmas pearly makeup',
                occasion: 'just to feel something'
            },
            {
                name: 'marrakech intense',
                image: 'aesop_marrakech_halftone.gif',
                smells: 'spicy soap',
                occasion: 'the everyday'
            },
            {
                name: 'cowboy',
                image: 'cowboy_mondo_halftone.gif',
                smells: 'sexy grass',
                occasion: 'feeling masc'
            },
            {
                name: 'serpentine',
                image: 'serpentine_halftone.gif',
                smells: 'ideal garden',
                occasion: 'feeling femme'
            },
            {
                name: 'radio bombay',
                image: 'radio_bombay_halftone.gif',
                smells: 'beach sand soaked in cologne',
                occasion: 'i fervently heart new york'
            },
            {
                name: 'saffron',
                image: 'scent_trunk_halftone.gif',
                smells: 'stepping foot into an ice cream shop',
                occasion: 'night out'
            },
            {
                name: 'milk',
                image: 'milk_lotion_halftone.gif',
                smells: 'things are under control',
                occasion: 'after shower or reading in bed'
            },
            {
                name: 'frankincense & myrrh',
                image: 'zum_laundry_halftone.gif',
                smells: 'politely killing it',
                occasion: 'laundry time'
            },
            {
                name: 'thieves oil',
                image: 'thieves_oil_halftone.gif',
                smells: 'a still carpeted office',
                occasion: 'autumn'
            }
        ];

        // Display perfumes
        function displayPerfumes() {
            const grid = document.getElementById('perfumeGrid');
            grid.innerHTML = '';

            perfumes.forEach((perfume, index) => {
                const item = document.createElement('div');
                item.className = 'perfume-item';
                item.dataset.index = index;

                item.innerHTML = `
                    <img src="${perfume.image}" alt="${perfume.name}" class="perfume-image">
                `;

                item.addEventListener('click', () => openModal(perfume));

                grid.appendChild(item);
            });
        }

        // Modal functionality
        const modal = document.getElementById('modal');
        const modalClose = document.getElementById('modalClose');
        const modalContent = document.querySelector('.modal-content');
        let mistTimeout;

        function openModal(perfume) {
            document.getElementById('modalName').textContent = perfume.name;
            document.getElementById('modalSmells').textContent = `impression: ${perfume.smells}`;
            document.getElementById('modalOccasion').textContent = `occasion: ${perfume.occasion}`;
            
            modal.classList.add('active');
            modalContent.classList.remove('misting');
            
            // Clear any existing timeout
            clearTimeout(mistTimeout);
            
            // Start misting after 3 seconds
            mistTimeout = setTimeout(() => {
                modalContent.classList.add('misting');
                
                // Close modal after mist animation completes
                setTimeout(() => {
                    closeModal();
                }, 4000);
            }, 3000);
        }

        function closeModal() {
            clearTimeout(mistTimeout);
            modal.classList.remove('active');
            modalContent.classList.remove('misting');
        }

        modalClose.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        displayPerfumes();

        // Custom cursor
        const cursor = document.getElementById('custom-cursor');
        let cursorTimeout;

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 30 + 'px';
            cursor.style.top = e.clientY - 30 + 'px';
            cursor.classList.remove('hidden');

            clearTimeout(cursorTimeout);
            cursorTimeout = setTimeout(() => {
                cursor.classList.add('hidden');
            }, 1000);
        });

        // Touch trail for mobile
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            
            const trailDot = document.createElement('div');
            trailDot.style.position = 'fixed';
            trailDot.style.left = touch.clientX - 20 + 'px';
            trailDot.style.top = touch.clientY - 20 + 'px';
            trailDot.style.width = '40px';
            trailDot.style.height = '40px';
            trailDot.style.backgroundImage = 'url("dog_nose_cropped.png")';
            trailDot.style.backgroundSize = 'contain';
            trailDot.style.backgroundRepeat = 'no-repeat';
            trailDot.style.opacity = '0.4';
            trailDot.style.filter = 'blur(2px)';
            trailDot.style.pointerEvents = 'none';
            trailDot.style.zIndex = '9998';
            trailDot.style.transition = 'opacity 0.8s ease';
            document.body.appendChild(trailDot);
            
            setTimeout(() => {
                trailDot.style.opacity = '0';
            }, 10);
            
            setTimeout(() => {
                trailDot.remove();
            }, 800);
        });
    </script>
</body>
</html>
