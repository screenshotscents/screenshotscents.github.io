<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" type="image/png" href="favicon-32x32.png">
    <link rel="icon" type="image/png" href="favicon-32x32.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragrance - Screenshot Scents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        *:not(.back-link):not(.email-link) {
            cursor: none;
        }

        #custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            background-image: url('dog_nose_white.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 10002;
            transition: opacity 0.5s ease;
            opacity: 0.3;
            display: none;
            filter: blur(1px);
        }

        #custom-cursor.hidden { opacity: 0; }

        @media (hover: hover) and (pointer: fine) {
            #custom-cursor { display: block; }
        }

        body {
            background: black;
            color: white;
            font-family: 'Times New Roman', Times, serif;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.0;
        }

        header {
            text-align: left;
            margin-bottom: 50px;
            padding-bottom: 30px;
        }

        .logo-image {
            height: 120px;
            display: block;
            margin-bottom: 20px;
            animation: screenshotFlash 11s ease-in-out infinite;
        }

        @keyframes screenshotFlash {
            0%, 93% { opacity: 1; }
            94% { opacity: 0.05; }
            95% { opacity: 0.3; }
            96% { opacity: 0.7; }
            97% { opacity: 1; }
            100% { opacity: 1; }
        }

        #datetime { font-size: 1.1em; margin-bottom: 10px; }
        #current-time { font-size: 1.1em; color: #ccc; }

        #last-online {
            font-size: 0.9em;
            color: #999;
            margin-top: 10px;
            font-style: italic;
        }

        .back-link, .email-link {
            font-size: 1.1em;
            font-family: 'Times New Roman', Times, serif;
            color: white;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .back-link:hover, .email-link:hover { color: white; }

        .email-reveal {
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.1em;
            color: white;
            white-space: nowrap;
            display: inline;
            opacity: 0;
            animation: fadeIn 0.8s ease-in forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .misting { animation: mistOut 4s ease-out forwards; }

        @keyframes mistOut {
            0% { opacity: 1; filter: blur(0px); }
            50% { opacity: 0.5; filter: blur(1px); }
            100% { opacity: 0; filter: blur(3px); }
        }

        .moon-symbol-fixed {
            font-size: 1.5em;
            color: white;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
        }

        .hologram-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 600px;
            perspective: 1000px;
            margin-bottom: 60px;
        }

        .cassette-hologram {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite, glitch 10s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateY(-5deg); }
            50% { transform: translateY(-20px) rotateY(5deg); }
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0) rotateY(-5deg); }
            91% { transform: translate(-2px, 2px) rotateY(-5deg); }
            92% { transform: translate(2px, -2px) rotateY(-5deg); }
            93% { transform: translate(-2px, 2px) rotateY(-5deg); }
            94% { transform: translate(0) rotateY(-5deg); }
        }

        .cassette-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 40px rgba(0, 100, 100, 0.6));
            animation: hologramPulse 3s ease-in-out infinite;
        }

        @keyframes hologramPulse {
            0%, 100% { 
                filter: drop-shadow(0 0 40px rgba(0, 100, 100, 0.6)) brightness(1.1);
            }
            50% { 
                filter: drop-shadow(0 0 60px rgba(0, 150, 150, 0.8)) brightness(1.3);
            }
        }

        .cassette-hologram::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                0deg,
                transparent 0%,
                rgba(0, 200, 200, 0.1) 2%,
                transparent 4%
            );
            background-size: 100% 3px;
            pointer-events: none;
            z-index: 2;
            animation: scanlines 8s linear infinite;
        }

        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(100%); }
        }

        .cassette-hologram::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(0, 255, 255, 0.1) 50%,
                transparent 70%
            );
            pointer-events: none;
            z-index: 1;
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .hologram-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 120%;
            background: radial-gradient(
                ellipse at center,
                rgba(0, 100, 100, 0.3) 0%,
                transparent 70%
            );
            animation: glow 3s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes glow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .coming-soon {
            font-size: 1.1em;
            text-align: center;
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(0.96); }
        }

        @media (max-width: 768px) {
            .hologram-container {
                max-width: 300px;
                height: 450px;
            }

            .moon-symbol-fixed { top: 40px; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    
    <header>
        <img src="screenshot_scents_text_white.png" alt="Screenshot Scents" class="logo-image">
        <div><span id="datetime"></span> <span id="current-time"></span> <span id="moonSymbol"></span></div>
        <div id="last-online"></div>
        <div id="headerLinks" style="display: flex; gap: 15px; margin-top: 10px;">
            <a href="index.html" class="back-link">back</a>
            <a class="email-link" id="emailLink">contact</a>
        </div>
    </header>

    <div class="content">
        <div class="hologram-container">
            <div class="cassette-hologram">
                <img src="IMG_2722.jpeg" alt="ebilen cassette" class="cassette-image">
            </div>
        </div>
        
        <div class="coming-soon">coming soon...</div>
    </div>

    <script>
        function updateDateTime() {
            const now = new Date();
            document.getElementById('datetime').textContent = now.toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
            document.getElementById('current-time').textContent = now.toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        function getMoonPhase(date) {
            const knownNewMoon = new Date(2000, 0, 6, 18, 14);
            const lunarCycle = 29.53058867;
            const diff = (date - knownNewMoon) / (1000 * 60 * 60 * 24);
            const phase = ((diff % lunarCycle) + lunarCycle) % lunarCycle;
            if (phase < 1.84566) return '●';
            if (phase < 5.53699) return '☽';
            if (phase < 9.22831) return '◐';
            if (phase < 12.91963) return '◑';
            if (phase < 16.61096) return '○';
            if (phase < 20.30228) return '◐';
            if (phase < 23.99361) return '◑';
            if (phase < 27.68493) return '☾';
            return '●';
        }

        function updateMoonSymbol() {
            document.getElementById('moonSymbol').textContent = getMoonPhase(new Date());
        }
        updateMoonSymbol();
        setInterval(updateMoonSymbol, 60000);

        document.getElementById('last-online').textContent = 'ebilen — coming soon';

        const cursor = document.getElementById('custom-cursor');
        let cursorTimeout;

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 30 + 'px';
            cursor.style.top = e.clientY - 30 + 'px';
            cursor.classList.remove('hidden');

            const dot = document.createElement('div');
            dot.style.cssText = `position:fixed;left:${e.clientX-20}px;top:${e.clientY-20}px;width:40px;height:40px;background-image:url("dog_nose_white.png");background-size:contain;background-repeat:no-repeat;opacity:0.4;filter:blur(2px);pointer-events:none;z-index:10002;transition:opacity 0.8s ease,transform 0.8s ease;`;
            document.body.appendChild(dot);
            requestAnimationFrame(() => { dot.style.opacity = '0'; dot.style.transform = 'scale(1.5)'; });
            setTimeout(() => dot.remove(), 800);

            clearTimeout(cursorTimeout);
            cursorTimeout = setTimeout(() => cursor.classList.add('hidden'), 1000);
        });

        let lastTouch = 0;
        document.addEventListener('touchmove', (e) => {
            const now = Date.now();
            if (now - lastTouch < 100) return;
            lastTouch = now;
            const t = e.touches[0];
            const dot = document.createElement('div');
            dot.style.cssText = `position:fixed;left:${t.clientX-20}px;top:${t.clientY-20}px;width:40px;height:40px;background-image:url("dog_nose_white.png");background-size:contain;background-repeat:no-repeat;opacity:0.4;filter:blur(2px);pointer-events:none;z-index:10002;transition:opacity 0.8s ease,transform 0.8s ease;`;
            document.body.appendChild(dot);
            requestAnimationFrame(() => { dot.style.opacity = '0'; dot.style.transform = 'scale(1.5)'; });
            setTimeout(() => dot.remove(), 800);
        }, { passive: true });

        const emailLink = document.getElementById('emailLink');
        let emailClicked = false;
        emailLink.addEventListener('click', (e) => {
            e.preventDefault();
            if (emailClicked) return;
            emailClicked = true;
            emailLink.classList.add('hidden');
            const emailText = document.createElement('span');
            emailText.className = 'email-reveal';
            emailText.textContent = 'screenshotscents [at] gmail';
            document.getElementById('headerLinks').appendChild(emailText);
            setTimeout(() => {
                emailText.classList.add('misting');
                setTimeout(() => { emailText.remove(); emailClicked = false; emailLink.classList.remove('hidden'); }, 4000);
            }, 1500);
        });
    </script>
</body>
</html>
