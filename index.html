        function updateDateTime() {
            const now = new Date();
            document.getElementById('datetime').textContent = now.toLocaleDateString('en-US', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });
            document.getElementById('current-time').textContent = now.toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }
        
        updateDateTime();
        setInterval(updateDateTime, 1000);

        function getMoonPhase(date) {
            const knownNewMoon = new Date(2000, 0, 6, 18, 14);
            const lunarCycle = 29.53058867;
            const diff = (date - knownNewMoon) / (1000 * 60 * 60 * 24);
            const phase = ((diff % lunarCycle) + lunarCycle) % lunarCycle;
            if (phase < 1.84566) return '●';
            if (phase < 5.53699) return '☽';
            if (phase < 9.22831) return '◐';
            if (phase < 12.91963) return '◑';
            if (phase < 16.61096) return '○';
            if (phase < 20.30228) return '◐';
            if (phase < 23.99361) return '◑';
            if (phase < 27.68493) return '☾';
            return '●';
        }
        
        function updateMoonSymbol() {
            document.getElementById('moonSymbol').textContent = getMoonPhase(new Date());
        }
        
        updateMoonSymbol();

            const touch = e.touches[0];
            const trailDot = document.createElement('div');
            trailDot.style.cssText = `position:fixed;left:${touch.clientX - 20}px;top:${touch.clientY - 20}px;width:40px;height:40px;background-image:url("dog_nose_cropped.png");background-size:contain;background-repeat:no-repeat;opacity:0.4;filter:blur(2px);pointer-events:none;z-index:9998;transition:opacity 0.8s ease,transform 0.8s ease;`;
            document.body.appendChild(trailDot);
            
            requestAnimationFrame(() => {
                trailDot.style.opacity = '0';
                trailDot.style.transform = 'scale(1.5)';
            });
            
            setTimeout(() => trailDot.remove(), 800);
        }, { passive: true });

        function getLastOnline() {
            const mostRecent = posts.reduce((a, b) => 
                new Date(a.timestamp) > new Date(b.timestamp) ? a : b
            );
            const postDate = new Date(mostRecent.timestamp);
            const now = new Date();
            const diffDays = Math.floor((now - postDate) / (1000 * 60 * 60 * 24));
            const timeAgo = diffDays === 0 ? 'today' : diffDays === 1 ? '1 day ago' : `${diffDays} days ago`;
            const moonNames = {
                '●': 'a new moon', '☽': 'a waxing crescent', '◐': 'a first quarter moon',
                '◑': 'a waxing gibbous', '○': 'a full moon', '☾': 'a waning crescent'
            };
            const moon = getMoonPhase(postDate);
            document.getElementById('last-online').textContent = 
                `last online ${timeAgo}, under ${moonNames[moon] || 'the moon'}`;
        }
        
        getLastOnline();

        // About button
        const aboutLink = document.getElementById('aboutLink');
        let aboutClicked = false;
        
        aboutLink.addEventListener('click', (e) => {
            e.preventDefault();
            if (aboutClicked) return;
            aboutClicked = true;
            aboutLink.classList.add('hidden');
            
            const aboutText = document.createElement('div');
            aboutText.className = 'about-text typing';
            aboutText.style.borderRight = '2px solid black';
            document.body.appendChild(aboutText);
            
            const fullText = 'sabrina is a blogger who stops and reads nail polish names';
            let charIndex = 0;
            
            const typeInterval = setInterval(() => {
                if (charIndex < fullText.length) {
                    aboutText.textContent = fullText.substring(0, charIndex + 1);
                    charIndex++;
                } else {
                    clearInterval(typeInterval);
                    aboutText.style.borderRight = 'none';
                    setTimeout(() => {
                        aboutText.classList.remove('typing');
                        aboutText.classList.add('misting');
                        setTimeout(() => aboutText.remove(), 4000);
                    }, 500);
                }
            }, 80);
        });

        // Email button
        const emailLink = document.getElementById('emailLink');
        let emailClicked = false;
        
        emailLink.addEventListener('click', (e) => {
            e.preventDefault();
            if (emailClicked) return;
            emailClicked = true;
            emailLink.classList.add('hidden');
            
            const emailText = document.createElement('div');
            emailText.className = 'email-reveal';
            emailText.textContent = 'screenshotscents [at] gmail';
            document.querySelector('header').appendChild(emailText);
            
            setTimeout(() => {
                emailText.classList.add('misting');
                setTimeout(() => {
                    emailText.remove();
                    emailClicked = false;
                    emailLink.classList.remove('hidden');
                }, 4000);
            }, 1500);
        });
        
        // Tester strip
        const input = document.getElementById('testerInput');
        const cardStack = document.getElementById('cardStack');
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxQ4l46fvEUFX_CcfhXJ6QRQomfJ1DcomWv73K9DwNUjyvpHVQqdsNCCuFQYLf0PKCRtg/exec';
        
        let submissions = [];
        let isLoading = false;
        
        async function loadSubmissions() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                submissions = data.submissions || [];
                renderCards();
            } catch (error) {
                console.error('Error loading submissions:', error);
            }
        }
        
        async function saveSubmission(text) {
            if (isLoading) return;
            isLoading = true;
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ submission: text })
                });
                const data = await response.json();
                if (data.success) {
                    submissions = data.submissions || [];
                    renderCards();
                }
            } catch (error) {
                console.error('Error saving submission:', error);
            } finally {
                isLoading = false;
            }
        }
        
        function stripPunctuation(text) {
            return text.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()'"?]/g, '');
        }
        
        function createCard(text) {
            const card = document.createElement('div');
            card.className = 'strip-card';
            card.innerHTML = `
                <svg class="strip-svg" viewBox="0 0 240 70" preserveAspectRatio="none">
                    <path d="M 0,7 L 200,7 L 240,35 L 200,63 L 0,63 Z" 
                          fill="white" stroke="black" stroke-width="0.3"/>
                </svg>
                <div class="submission-text">${text}</div>
            `;
            return card;
        }
        
        function renderCards() {
            cardStack.innerHTML = '';
            submissions.slice(0, 10).forEach(text => {
                cardStack.appendChild(createCard(text));
            });
        }
        
        cardStack.addEventListener('click', () => {
            if (submissions.length > 1) {
                const topCard = cardStack.querySelector('.strip-card:first-child');
                if (topCard && !topCard.classList.contains('moving-back')) {
                    topCard.classList.add('moving-back');
                    setTimeout(() => {
                        submissions.push(submissions.shift());
                        renderCards();
                    }, 800);
                }
            }
        });

        if (input) {
            input.addEventListener('keypress', async (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const text = stripPunctuation(input.value.trim());
                    if (text && !isLoading) {
                        input.value = '';
                        input.placeholder = 'saving...';
                        await saveSubmission(text);
                        input.placeholder = 'capture a moment';
                    }
                }
            });
        }
        
        loadSubmissions();
        
    </script>
</body>
</html>
