<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" type="image/png" href="favicon-32x32.png">
    <link rel="icon" type="image/png" href="favicon-32x32.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragrance - Screenshot Scents</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        *:not(.back-link):not(.email-link):not(.about-link) {
            cursor: none;
        }

        #custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            background-image: url('dog_nose_white.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 10002;
            transition: opacity 0.5s ease;
            opacity: 0.3;
            display: none;
            filter: blur(1px);
        }

        #custom-cursor.hidden { opacity: 0; }

        @media (hover: hover) and (pointer: fine) {
            #custom-cursor { display: block; }
        }

        body {
            background: black;
            color: white;
            font-family: 'Oswald', sans-serif;
            font-weight: 200;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.0;
        }

        header {
            text-align: left;
            margin-bottom: 50px;
            padding-bottom: 30px;
        }

        .logo-image {
            height: 120px;
            display: block;
            margin-bottom: 20px;
            animation: screenshotFlash 11s ease-in-out infinite;
        }

        @keyframes screenshotFlash {
            0%, 93% { opacity: 1; }
            94% { opacity: 0.05; }
            95% { opacity: 0.3; }
            96% { opacity: 0.7; }
            97% { opacity: 1; }
            100% { opacity: 1; }
        }

        #datetime { font-size: 1.1em; margin-bottom: 10px; }
        #current-time { font-size: 1.1em; color: #ccc; }

        #last-online {
            font-size: 0.9em;
            color: #999;
            margin-top: 10px;
            font-style: italic;
        }

        .back-link, .email-link {
            font-size: 1.1em;
            font-family: 'Oswald', sans-serif;
            font-weight: 200;
            color: white;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .back-link:hover, .email-link:hover { color: white; }
        .email-link.hidden { display: none; }

        .email-reveal {
            font-family: 'Oswald', sans-serif;
            font-weight: 200;
            font-size: 1.1em;
            color: white;
            white-space: nowrap;
            display: inline;
            opacity: 0;
            animation: fadeIn 0.8s ease-in forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .misting { animation: mistOut 4s ease-out forwards; }

        @keyframes mistOut {
            0% { opacity: 1; filter: blur(0px); }
            50% { opacity: 0.5; filter: blur(1px); }
            100% { opacity: 0; filter: blur(3px); }
        }

        .grid {
            columns: 3;
            column-gap: 20px;
            margin-top: 40px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @media (max-width: 700px) {
            .grid { columns: 2; }
        }

        @media (max-width: 420px) {
            .grid { columns: 1; }
        }

        .grid-item {
            break-inside: avoid;
            margin-bottom: 20px;
            display: grid;
            grid-template-rows: auto auto;
        }

        .grid-item-title {
            font-size: 1.0em;
            font-style: normal;
            font-family: 'Oswald', sans-serif;
            font-weight: 400;
            margin-top: 8px;
            margin-bottom: 0;
            color: white;
            text-align: center;
            display: block;
        }

        .grid-item-content {
            font-size: 0.9em;
            font-family: 'Oswald', sans-serif;
            font-weight: 200;
            white-space: pre-wrap;
            line-height: 1.4;
            color: white;
        }

        .grid-item-photo,
        .grid-item-photo-only {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 3 / 4;
            object-fit: cover;
        }

        .word {
            display: inline-block;
            animation: wordBreathe 3s ease-in-out infinite;
            will-change: opacity, transform;
            contain: layout style;
        }

        @keyframes wordBreathe {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.94); }
        }

        .moon-symbol-fixed {
            font-size: 1.5em;
            color: white;
        }

        .about-link {
            position: fixed;
            bottom: 20px; right: 20px;
            font-size: 1.1em;
            font-family: 'Oswald', sans-serif;
            font-weight: 200;
            color: white;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
            z-index: 1000;
            pointer-events: auto;
        }

        .about-link:hover { color: white; }
        .about-link.hidden { display: none; }

        .about-text {
            position: fixed;
            bottom: 20px; right: 20px;
            font-family: 'Oswald', sans-serif;
            font-weight: 200;
            font-size: 1.1em;
            color: white;
            z-index: 10000;
            text-align: right;
            white-space: nowrap;
        }

        #load-sentinel { height: 1px; margin-top: 40px; }

        @media (max-width: 768px) {
            .moon-symbol-fixed { top: 40px; }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>

    <a href="#" class="about-link" id="aboutLink">about</a>

    <header>
        <a href="https://screenshotscents.github.io"><img src="screenshot_scents_text.png" alt="Screenshot Scents" class="logo-image"></a>
        <div><span id="datetime"></span> <span id="current-time"></span> <span id="moonSymbol"></span></div>
        <div id="last-online"></div>
        <div id="headerLinks" style="display: flex; gap: 15px; margin-top: 10px;">
            <a href="index.html" class="back-link">blog</a>
            <a class="email-link" id="emailLink">contact</a>
        </div>
    </header>

    <div class="grid" id="grid"></div>
    <div id="load-sentinel"></div>

    <script>
        const posts = [
            {
                timestamp: '2026-04-20T00:00:00',
                title: 'ebilen - Screenshot Scents 001',
                content: '',
                photo: 'IMG_2722.jpeg',
                link: 'https://screenshotscents.bandcamp.com/album/ebilen-screenshot-scents-001'
            }
            // add more posts here
        ];

        posts.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        const BATCH_SIZE = 12;
        let renderedCount = 0;
        let isRendering = false;

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function wrapWords(content, postIndex) {
            const escaped = escapeHtml(content);
            return escaped.split('\n').map(line =>
                line.split(' ').map((word, i) => {
                    const delay = ((i * 0.1) + (postIndex * 0.3)) % 2;
                    return `<span class="word" style="animation-delay:${delay.toFixed(2)}s">${word}</span>`;
                }).join(' ')
            ).join('\n');
        }

        function renderBatch() {
            if (isRendering || renderedCount >= posts.length) return;
            isRendering = true;
        
            const container = document.getElementById('grid');
            const fragment = document.createDocumentFragment();
            const end = Math.min(renderedCount + BATCH_SIZE, posts.length);
        
            for (let i = renderedCount; i < end; i++) {
                const post = posts[i];
                const div = document.createElement('div');
                div.className = 'grid-item';
                const titleId = `title-${i}`;
        
                let photoHtml = '';
                if (post.photo) {
                    const img = `<img src="${post.photo}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">`;
                    const wrapped = `<div style="width:100%;padding-top:133%;position:relative;"><div style="position:absolute;top:0;left:0;right:0;bottom:0;">${img}</div></div>`;
                    photoHtml = post.link ? `<a href="${post.link}" target="_blank">${wrapped}</a>` : wrapped;
                }
        
                const titleHtml = post.title
                    ? `<div class="grid-item-title">${post.link ? `<a href="${post.link}" target="_blank" style="color:white;text-decoration:none;display:block;">${escapeHtml(post.title)}</a>` : escapeHtml(post.title)}</div>`
                    : '';
        
                const contentHtml = post.content
                    ? `<div class="grid-item-content">${wrapWords(post.content, i)}</div>`
                    : '';
        
                div.innerHTML = `
                    ${contentHtml}
                    ${photoHtml}
                    ${titleHtml}
                `;
                fragment.appendChild(div);
            }
        
            container.appendChild(fragment);
            renderedCount = end;
            isRendering = false;
        }

        const sentinel = document.getElementById('load-sentinel');
        const loadObserver = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) renderBatch();
        }, { rootMargin: '200px' });
        loadObserver.observe(sentinel);
        renderBatch();

        function updateDateTime() {
            const now = new Date();
            document.getElementById('datetime').textContent = now.toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
            document.getElementById('current-time').textContent = now.toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        function getMoonPhase(date) {
            const knownNewMoon = new Date(2000, 0, 6, 18, 14);
            const lunarCycle = 29.53058867;
            const diff = (date - knownNewMoon) / (1000 * 60 * 60 * 24);
            const phase = ((diff % lunarCycle) + lunarCycle) % lunarCycle;
            if (phase < 1.84566) return '●';
            if (phase < 5.53699) return '☽';
            if (phase < 9.22831) return '◐';
            if (phase < 12.91963) return '◑';
            if (phase < 16.61096) return '○';
            if (phase < 20.30228) return '◐';
            if (phase < 23.99361) return '◑';
            if (phase < 27.68493) return '☾';
            return '●';
        }

        function updateMoonSymbol() {
            document.getElementById('moonSymbol').textContent = getMoonPhase(new Date());
        }
        updateMoonSymbol();
        setInterval(updateMoonSymbol, 60000);

        function getLastOnline() {
            const mostRecent = posts.reduce((a, b) =>
                new Date(a.timestamp) > new Date(b.timestamp) ? a : b);
            const postDate = new Date(mostRecent.timestamp);
            const diffDays = Math.floor((new Date() - postDate) / (1000 * 60 * 60 * 24));
            const timeAgo = diffDays === 0 ? 'today' : diffDays === 1 ? '1 day ago' : `${diffDays} days ago`;
            const moonNames = {
                '●': 'a new moon', '☽': 'a waxing crescent', '◐': 'a first quarter moon',
                '◑': 'a waxing gibbous', '○': 'a full moon', '☾': 'a waning crescent'
            };
            document.getElementById('last-online').textContent =
                `last updated ${timeAgo}, under ${moonNames[getMoonPhase(postDate)] || 'the moon'}`;
        }
        getLastOnline();

        const cursor = document.getElementById('custom-cursor');
        let cursorTimeout;

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 30 + 'px';
            cursor.style.top = e.clientY - 30 + 'px';
            cursor.classList.remove('hidden');

            const dot = document.createElement('div');
            dot.style.cssText = `position:fixed;left:${e.clientX-20}px;top:${e.clientY-20}px;width:40px;height:40px;background-image:url("dog_nose_white.png");background-size:contain;background-repeat:no-repeat;opacity:0.4;filter:blur(2px);pointer-events:none;z-index:10002;transition:opacity 0.8s ease,transform 0.8s ease;`;
            document.body.appendChild(dot);
            requestAnimationFrame(() => { dot.style.opacity = '0'; dot.style.transform = 'scale(1.5)'; });
            setTimeout(() => dot.remove(), 800);

            clearTimeout(cursorTimeout);
            cursorTimeout = setTimeout(() => cursor.classList.add('hidden'), 1000);
        });

        let lastTouch = 0;
        document.addEventListener('touchmove', (e) => {
            const now = Date.now();
            if (now - lastTouch < 100) return;
            lastTouch = now;
            const t = e.touches[0];
            const dot = document.createElement('div');
            dot.style.cssText = `position:fixed;left:${t.clientX-20}px;top:${t.clientY-20}px;width:40px;height:40px;background-image:url("dog_nose_white.png");background-size:contain;background-repeat:no-repeat;opacity:0.4;filter:blur(2px);pointer-events:none;z-index:10002;transition:opacity 0.8s ease,transform 0.8s ease;`;
            document.body.appendChild(dot);
            requestAnimationFrame(() => { dot.style.opacity = '0'; dot.style.transform = 'scale(1.5)'; });
            setTimeout(() => dot.remove(), 800);
        }, { passive: true });

        const aboutLink = document.getElementById('aboutLink');
        let aboutClicked = false;
        aboutLink.addEventListener('click', (e) => {
            e.preventDefault();
            if (aboutClicked) return;
            aboutClicked = true;
            aboutLink.classList.add('hidden');
            const aboutText = document.createElement('div');
            aboutText.className = 'about-text';
            aboutText.style.borderRight = '2px solid white';
            document.body.appendChild(aboutText);
            const fullText = 'sabrina is a blogger who stops and reads nail polish names';
            let i = 0;
            const t = setInterval(() => {
                if (i < fullText.length) { aboutText.textContent = fullText.substring(0, ++i); }
                else {
                    clearInterval(t);
                    aboutText.style.borderRight = 'none';
                    setTimeout(() => {
                        aboutText.classList.add('misting');
                        setTimeout(() => aboutText.remove(), 4000);
                    }, 500);
                }
            }, 80);
        });

        const emailLink = document.getElementById('emailLink');
        let emailClicked = false;
        emailLink.addEventListener('click', (e) => {
            e.preventDefault();
            if (emailClicked) return;
            emailClicked = true;
            emailLink.classList.add('hidden');
            const emailText = document.createElement('span');
            emailText.className = 'email-reveal';
            emailText.textContent = 'screenshotscents [at] gmail';
            emailLink.insertAdjacentElement('afterend', emailText);
            setTimeout(() => {
                emailText.classList.add('misting');
                setTimeout(() => { emailText.remove(); emailClicked = false; emailLink.classList.remove('hidden'); }, 4000);
            }, 1500);
        });
    </script>
</body>
</html>
