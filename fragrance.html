<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="shortcut icon" type="image/png" href="favicon-32x32.png">
    <link rel="icon" type="image/png" href="favicon-32x32.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragrance - Screenshot Scents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        *:not(.back-link) {
            cursor: none;
        }

        #custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            background-image: url('dog_nose_white.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.5s ease;
            opacity: 0.3;
            display: none;
            filter: blur(1px);
        }

        #custom-cursor.hidden { opacity: 0; }

        @media (hover: hover) and (pointer: fine) {
            #custom-cursor { display: block; }
        }

        body {
            background: black;
            color: white;
            font-family: 'Times New Roman', Times, serif;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo-image {
            height: 120px;
            display: block;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 1.1em;
            font-weight: normal;
            margin-bottom: 20px;
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(0.96); }
        }

        .back-link {
            font-size: 1.1em;
            color: white;
            text-decoration: none;
            display: inline-block;
            margin-top: 30px;
            cursor: pointer;
            pointer-events: auto;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <img src="screenshot_scents_text_white.png" alt="Screenshot Scents" class="logo-image">
    <h1>coming soon...</h1>
    <a href="index.html" class="back-link">← back to blog</a>

    <script>
        // Custom cursor
        const cursor = document.getElementById('custom-cursor');
        let cursorTimeout;

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 30 + 'px';
            cursor.style.top = e.clientY - 30 + 'px';
            cursor.classList.remove('hidden');

            const dot = document.createElement('div');
            dot.style.cssText = `position:fixed;left:${e.clientX-20}px;top:${e.clientY-20}px;width:40px;height:40px;background-image:url("dog_nose_white.png");background-size:contain;background-repeat:no-repeat;opacity:0.4;filter:blur(2px);pointer-events:none;z-index:9998;transition:opacity 0.8s ease,transform 0.8s ease;`;
            document.body.appendChild(dot);
            requestAnimationFrame(() => { dot.style.opacity = '0'; dot.style.transform = 'scale(1.5)'; });
            setTimeout(() => dot.remove(), 800);

            clearTimeout(cursorTimeout);
            cursorTimeout = setTimeout(() => cursor.classList.add('hidden'), 1000);
        });

        // Touch trail throttled to 100ms
        let lastTouch = 0;
        document.addEventListener('touchmove', (e) => {
            const now = Date.now();
            if (now - lastTouch < 100) return;
            lastTouch = now;
            const t = e.touches[0];
            const dot = document.createElement('div');
            dot.style.cssText = `position:fixed;left:${t.clientX-20}px;top:${t.clientY-20}px;width:40px;height:40px;background-image:url("dog_nose_white.png");background-size:contain;background-repeat:no-repeat;opacity:0.4;filter:blur(2px);pointer-events:none;z-index:9998;transition:opacity 0.8s ease,transform 0.8s ease;`;
            document.body.appendChild(dot);
            requestAnimationFrame(() => { dot.style.opacity = '0'; dot.style.transform = 'scale(1.5)'; });
            setTimeout(() => dot.remove(), 800);
        }, { passive: true });
    </script>
</body>
</html>
